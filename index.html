<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <!-- إعدادات العرض لتناسب جميع الأجهزة -->
  <meta name="viewport"
    content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0" />

  <!-- تحسين التوافق مع Internet Explorer -->
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />

  <!-- ربط خط Poppins من Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,700;1,400;1,800&display=swap"
    rel="stylesheet" />

  <!-- ربط ملف CSS الخارجي -->
  <link rel="stylesheet" href="styles/style.css" />
  <title>Age Calculator</title>
</head>

<body>
  <!-- الحاوية الرئيسية للتصميم -->
  <div class="container">

    <!-- الكرت الذي يحتوي على النموذج والنتيجة -->
    <div class="card">

      <!-- نموذج إدخال تاريخ الميلاد -->
      <form id="age-form" class="card__form">

        <!-- إدخال اليوم -->
        <div class="card__inputContainer">
          <label for="day" class="card__label">Day</label>
          <input id="day" name="day" type="number" class="card__input" placeholder="DD" min="0" />
          <span class="card__errorMessage">must be a valid day</span>
        </div>

        <!-- إدخال الشهر -->
        <div class="card__inputContainer">
          <label for="month" class="card__label">Month</label>
          <input id="month" name="month" type="number" class="card__input" placeholder="MM" min="0" />
          <span class="card__errorMessage">must be a valid month</span>
        </div>

        <!-- إدخال السنة -->
        <div class="card__inputContainer">
          <label for="year" class="card__label">Year</label>
          <input id="year" name="year" type="number" class="card__input" placeholder="YYYY" min="0" />
          <span class="card__errorMessage">must be a valid year</span>
        </div>

      </form>

      <!-- زر حساب العمر -->
      <div class="card__separator">
        <button class="card__button">Calculate</button>
      </div>

      <!-- عرض النتيجة -->
      <div class="card__result">
        <span class="card__resultLabel">You are</span>
        <span class="card__resultValue">--</span>
        <span class="card__resultLabel">Years old</span>
      </div>

    </div>
  </div>

  <!-- ربط ملف JavaScript -->
  <script src="./scripts/script.js" type="module"></script>
</body>

</html>
